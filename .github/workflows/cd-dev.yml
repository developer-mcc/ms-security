name: CD Dev

on:
  push:
    branches:
      - develop

concurrency:
  group: cd-dev
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & Push Dev
    uses: ./.github/workflows/reusable-build-and-push.yml
    with:
      image-tag: dev
      environment: dev
      spring-profile: dev
    permissions:
      contents: read
      packages: write

  deploy:
    name: Deploy to Dev
    needs: build-push
    runs-on: ubuntu-latest
    environment: dev
