name: CD Prod

on:
  push:
    branches:
      - main

concurrency:
  group: cd-prod
  cancel-in-progress: false  # NEVER cancel a production deployment

jobs:
  prepare:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from build.gradle
        id: version
        run: |
          VERSION=$(grep "^version" build.gradle | sed "s/version = '\(.*\)'/\1/" | sed "s/-SNAPSHOT//")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION}"

  build-push:
    name: Build & Push Prod
    needs: prepare
    uses: ./.github/workflows/reusable-build-and-push.yml
    with:
      image-tag: latest
      additional-tags: v${{ needs.prepare.outputs.version }}
      environment: prod
      spring-profile: prod
    permissions:
      contents: read
      packages: write

  deploy:
    name: Deploy to Production
    needs: [prepare, build-push]
    runs-on: ubuntu-latest
    environment: prod  # Requires manual approval via GitHub Environment protection rules
    steps:
      - name: Placeholder - Deploy to Prod
        run: |
          echo "============================================="
          echo "  TODO: Agregar paso de deploy a Prod"
          echo "  Image: ghcr.io/${{ github.repository }}:latest"
          echo "  Image: ghcr.io/${{ github.repository }}:v${{ needs.prepare.outputs.version }}"
          echo "============================================="
          echo ""
          echo "IMPORTANTE: Este job requiere aprobacion manual"
          echo "Configurar en GitHub > Settings > Environments > prod > Required reviewers"
