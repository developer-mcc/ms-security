spring:
  application:
    name: ms-security
  datasource:
    url: jdbc:postgresql://localhost:5432/sg-seguridad
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Admin2024}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: sec
  sql:
    init:
      mode: never

# --- Cache provider ---
# Cambiar a 'redis' cuando haya presupuesto y descomentar la dependencia en build.gradle
app:
  cache:
    provider: postgres

  security:
    max-login-attempts: 5
    block-duration-minutes: 15
    rate-limit-requests-per-minute: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Redis: descomentar cuando se active provider=redis
