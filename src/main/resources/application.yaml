spring:
  application:
    name: ms-security
  datasource:
    url: jdbc:postgresql://localhost:5432/sg-seguridad
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Admin2024}
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        default_schema: sec
  sql:
    init:
      mode: always

# --- Cache provider ---
# Cambiar a 'redis' cuando haya presupuesto y descomentar la dependencia en build.gradle
app:
  cache:
    provider: postgres

  jwt:
    private-key-path: classpath:keys/private.pem
    public-key-path: classpath:keys/public.pem
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7

  security:
    max-login-attempts: 5
    block-duration-minutes: 15
    rate-limit-requests-per-minute: 10

# Redis: descomentar cuando se active provider=redis
# spring.data.redis:
#   host: localhost
#   port: 6379
